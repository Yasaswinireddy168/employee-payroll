<!DOCTYPE html>
<html>
<head>
<title>Employee Payroll Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
}

/* Glass Card */
.container{
    width:350px;
    padding:40px 30px;
    border-radius:30px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
    text-align:center;
}

/* Title */
.container h2{
    color:white;
    margin-bottom:30px;
}

/* Input fields */
.input-group{
    display:flex;
    align-items:center;
    background: rgba(255,255,255,0.2);
    border-radius:10px;
    margin-bottom:15px;
    padding:10px;
}

.input-group i{
    color:white;
    margin-right:10px;
}

.input-group input{
    border:none;
    outline:none;
    background:transparent;
    color:white;
    width:100%;
}

.input-group input::placeholder{
    color:#ddd;
}

/* Button */
button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background: linear-gradient(45deg,#6a11cb,#2575fc);
    color:white;
    font-weight:500;
    cursor:pointer;
    margin-top:10px;
}

/* Links */
.link{
    margin-top:15px;
    color:#ccc;
    font-size:13px;
    cursor:pointer;
}

.link:hover{
    color:white;
}

</style>
</head>

<body>

<div class="container">

<h2>Sign In</h2>

<div class="input-group">
<input type="text" id="loginEmpId" placeholder="Employee ID">
</div>

<div class="input-group">
<input type="password" id="loginPassword" placeholder="Password">
</div>

<button onclick="login()">Login</button>

<div class="link" onclick="showRegister()">New User? Register</div>

</div>

<script>

function showRegister(){
    window.location.href = "/login.html#register";
}

async function login(){

    const empId = document.getElementById("loginEmpId").value;
    const password = document.getElementById("loginPassword").value;

    const response = await fetch("/auth/login", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ empId, password })
    });

    const data = await response.json();

    if(response.ok){

        localStorage.setItem("loggedUser", data.firstName + " " + data.lastName);
        localStorage.setItem("empId", data.empId);
        localStorage.setItem("designation", data.designation);

        window.location.href="/dashboard.html";
    }
    else{
        alert(data.message);
    }
}

</script>

</body>
</html>
